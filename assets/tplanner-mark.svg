<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="TPlanner brand mark">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c07b"/>
      <stop offset="100%" stop-color="#a87bff"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="120" height="120" rx="24" fill="#07090e"/>
  <!-- T left arm -->
  <line x1="18" y1="42" x2="60" y2="42" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <!-- Shared T + P vertical stem -->
  <line x1="60" y1="26" x2="60" y2="96" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <!-- P bowl: D-arc from stem at y=42 curving right and back to stem at y=76 -->
  <path d="M 60,42 Q 106,42 106,59 Q 106,76 60,76"
        stroke="url(#g)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
